<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Garden of Lilith</title>

  <!-- 📱 Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🎨 Styles -->
  <link rel="stylesheet" href="styles.css?v=12">
</head>

<body>

  <!-- =================================================
  🌙 GARDEN LILITH — ROOM 6
  4 optimized videos + fade transition + layered music
  ================================================= -->

  <div class="garden-scene">

    <!-- 🎥 VIDEO LAYERS FOR FADE -->
    <video id="videoA" class="scene-video active" autoplay muted playsinline preload="auto"></video>
    <video id="videoB" class="scene-video" muted playsinline preload="auto"></video>

    <!-- 🜏 SIGIL — RETURN TO ROOM 4 -->
    <a href="../room4/index.html" class="sigil-btn">
      <img src="assets/img/sigil.webp" alt="Return to Hall">
    </a>

    <!-- 🎵 MUSIC BUTTON -->
    <button id="musicToggle" class="music-btn">Music</button>

    <!-- 🔊 MULTI-LAYER MUSIC -->
    <audio id="layerSacral" loop preload="auto">
      <source src="assets/audio/garden_layer_1.mp3" type="audio/mpeg">
    </audio>

    <audio id="layerNight" loop preload="auto">
      <source src="assets/audio/garden_layer_3.mp3" type="audio/mpeg">
    </audio>

    <audio id="layerBell" preload="auto">
      <source src="assets/audio/garden_layer_2.mp3" type="audio/mpeg">
    </audio>

  </div>

  <!-- ⚙ JavaScript -->
  <script src="app.js?v=12"></script>

</body>
</html>
