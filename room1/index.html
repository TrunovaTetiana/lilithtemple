<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Храм Лилит — Врата</title>

<link rel="stylesheet" href="styles.css?v=6">

</head>

<body>

<!-- =========================================================
     🎬 VIDEO SCENE
========================================================= -->

<div class="scene-container">
  <video id="scene1" class="scene-video" preload="auto" playsinline></video>
  <video id="scene2" class="scene-video" preload="auto" playsinline></video>
  <video id="scene3" class="scene-video" preload="auto" playsinline></video>
  <video id="scene4" class="scene-video" preload="auto" playsinline></video>
</div>

<!-- =========================================================
     🌫 ATMOSPHERIC OVERLAYS
========================================================= -->

<div class="water"></div>
<div class="moon-mist"></div>

<!-- =========================================================
     🜏 TEXT
========================================================= -->

<div class="temple">

  <div class="whisper">

    <span class="line" style="--d:0.2s">Ты стоишь у входа.</span>
    <span class="line" style="--d:1.1s">Камень хранит тишину.</span>

    <span class="line" style="--d:2.2s">Здесь не спрашивают имён.</span>
    <span class="line" style="--d:3.1s">Здесь слушают шаг.</span>

    <span class="line" style="--d:4.2s">Не бойся правил.</span>
    <span class="line" style="--d:5.1s">Они ломаются от взгляда.</span>

    <span class="line" style="--d:6.2s">Некоторые идут к свету.</span>
    <span class="line" style="--d:7.1s">Другие — вглубь.</span>

    <span class="line" style="--d:8.4s">Время движется —</span>
    <span class="line" style="--d:9.2s">и даже если ты стоишь —</span>
    <span class="line" style="--d:10.0s">оно решает за тех, кто медлит.</span>

    <span class="line final" style="--d:11.8s">Познай меня — и,</span>
    <span class="line final" style="--d:12.8s">возможно, ты сделаешь выбор. Lilith</span>

  </div>

</div>

<!-- =========================================================
     🔊 SOUND BUTTON
     Слева внизу, отдельно от сигила
========================================================= -->

<button id="soundToggleBtn" class="sound-btn" type="button" aria-pressed="false">
  Sound: Off
</button>

<!-- =========================================================
     🜏 SIGIL
========================================================= -->

<div class="sigil-gate">
  <a href="../room2/index.html">
    <img src="assets/img/sigil.png?v=4" alt="Сигил Лилит">
  </a>
</div>

<!-- =========================================================
     🔊 LOOP AUDIO
========================================================= -->

<audio id="ambientAudio" loop preload="auto">
  <source src="assets/audio/vxod.mp3" type="audio/mpeg">
</audio>

<script src="app.js?v=6"></script>

</body>
</html>
