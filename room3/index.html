<body>

  <!-- 🎥 VIDEO BACKGROUND -->
  <video id="bgVideo" autoplay muted loop playsinline class="bg-video">

  <!-- 🔘 FALLBACK BUTTON (если autoplay не сработает) -->

  <audio id="bgSound" loop>
    <source src="assets/audio/room3_ambient.mp3" type="audio/mpeg">
  </audio>

  <button id="soundBtn" class="sound-btn">Sound</button>

  <!-- 🜏 SIGIL (назад) -->

  <div class="hotspot hotspot-center" data-target="../room10/index.html"></div>
