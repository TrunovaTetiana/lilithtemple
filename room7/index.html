<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temple of Sound</title>
  <link rel="stylesheet" href="styles.css?v=16" />
</head>
<body>

  <div class="scene-container">

    <!-- VIDEO BACKGROUND -->
    <video
      id="sceneVideo"
      class="scene-video"
      autoplay
      muted
      loop
      playsinline
      preload="metadata">
    </video>

    <!-- DARK OVERLAY -->
    <div class="scene-overlay"></div>

    <!-- ARTIST HOTSPOTS -->
    <button class="artist-hotspot hotspot-less-doll" data-card="less-doll" type="button" aria-label="Open Less Doll card"></button>
    <button class="artist-hotspot hotspot-nina" data-card="nina" type="button" aria-label="Open Nina card"></button>

    <!-- ROOM SOUND BUTTON -->
    <button id="roomSoundBtn" class="room-sound-btn" type="button">Sound:OFF</button>

    <!-- SIGIL -->
    <a href="../room4/index.html" class="sigil-link" aria-label="Back to Room 4">
      <img src="assets/img/sigil.webp" alt="Sigil" class="sigil-img" />
    </a>
  </div>

  <!-- =========================================================
       CARD OVERLAY
  ========================================================= -->
  <div id="cardOverlay" class="card-overlay hidden" aria-hidden="true">
    <div id="cardBackdrop" class="card-backdrop"></div>

    <div class="card-stage">

      <button id="prevCardBtn" class="side-arrow side-arrow-left" type="button" aria-label="Previous card">
        ‹
      </button>

      <div class="card-shell">

        <button id="closeCardBtn" class="close-card-btn" type="button" aria-label="Close card">
          ✕
        </button>

        <!-- LESS DOLL CARD -->
        <div id="card-less-doll" class="music-card hidden-card">
          <img
            src="assets/img/Less-Dol.webp"
            alt="Less Doll Card"
            class="card-image"
          />

          <div class="track-layer track-layer-less-doll">
            <button class="track-btn track-less-1" type="button" data-track="assets/audio/lessdol_doroga.mp3" data-group="less-doll"></button>
            <button class="track-btn track-less-2" type="button" data-track="assets/audio/lessdol_letat.mp3" data-group="less-doll"></button>
            <button class="track-btn track-less-3" type="button" data-track="assets/audio/lessdol_lilit.mp3" data-group="less-doll"></button>
            <button class="track-btn track-less-4" type="button" data-track="assets/audio/lessdol_vzyvayu_k_bogine.mp3" data-group="less-doll"></button>
            <button class="track-btn track-less-5" type="button" data-track="assets/audio/lessdol_yaya.mp3" data-group="less-doll"></button>
            <button class="track-btn track-less-6" type="button" data-track="assets/audio/lessdol_za_spinoy.mp3" data-group="less-doll"></button>
          </div>
        </div>

        <!-- NINA CARD -->
        <div id="card-nina" class="music-card hidden-card">
          <img
            src="assets/img/Nina_Chirkova.webp"
            alt="Nina Card"
            class="card-image"
          />

          <div class="track-layer track-layer-nina">
            <button class="track-btn track-nina-1" type="button" data-track="assets/audio/nina_ave_lilith.mp3" data-group="nina"></button>
            <button class="track-btn track-nina-2" type="button" data-track="assets/audio/nina_lilit.mp3" data-group="nina"></button>
            <button class="track-btn track-nina-3" type="button" data-track="assets/audio/nina_molitva_lilit.mp3" data-group="nina"></button>
            <button class="track-btn track-nina-4" type="button" data-track="assets/audio/nina_temnaya_mat_lilit.mp3" data-group="nina"></button>
            <button class="track-btn track-nina-5" type="button" data-track="assets/audio/nina_ja_pervaja.mp3" data-group="nina"></button>
          </div>
        </div>

      </div>

      <button id="nextCardBtn" class="side-arrow side-arrow-right" type="button" aria-label="Next card">
        ›
      </button>

    </div>
  </div>

  <!-- SINGLE MUSIC PLAYER (LAZY LOAD) -->
  <audio id="musicPlayer" preload="none"></audio>

  <script src="app.js?v=16"></script>
</body>
</html>
