<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inner Sanctum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css?v=9">
</head>
<body>

  <div class="scene-container">

    <!-- IMG  BACKGROUND -->

     <img class="scene-image" src="assets/img/hram.webp" alt="">

    <!-- BUTTON: unlock room sound -->
    <button id="soundBtn" class="sound-btn" type="button" aria-label="Enable room sound">
      
    </button>

    <!-- BUTTON: music on/off -->
    <button id="musicBtn" class="music-btn" type="button" aria-label="Toggle music">
      Whisper
    </button>

    <!-- DOOR SIGIL: transition to altar room -->
    <button class="sigil-door" id="doorBtn" type="button" aria-label="Enter altar room">
      <img src="assets/img/sigil.webp?v=2" alt="Door sigil">
    </button>

  </div>

  <!-- Separate music track -->
  <audio id="musicTrack" loop preload="auto">
    <source src="assets/audio/room5_music.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script src="app.js?v=9"></script>
</body>
</html>
