<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room 3 In</title>
  <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>

  <div class="scene-container">

    <video
      id="video1"
      class="scene-video active"
      playsinline
      preload="auto"
    >
      <source src="assets/video/01_in.mp4" type="video/mp4">
    </video>

    <video
      id="video2"
      class="scene-video"
      playsinline
      preload="auto"
    >
      <source src="assets/video/02_in.mp4" type="video/mp4">
    </video>

    <video
      id="video3"
      class="scene-video"
      playsinline
      preload="auto"
    >
      <source src="assets/video/03_in.mp4" type="video/mp4">
    </video>

    <!-- Кнопка звука -->
    <button id="soundTrigger" class="sound-trigger" aria-label="Enable sound">
      <img src="assets/img/key.png" alt="Sound sigil" class="sound-trigger-img">
      <span class="sound-trigger-text">Sound</span>
    </button>

  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
